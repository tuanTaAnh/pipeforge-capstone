version: 1

relationships:
  - id: customers_to_subscriptions
    left_source: dim_customers
    right_source: fact_subscriptions
    left_key: customer_id
    right_key: customer_id
    relationship_type: one_to_many
    recommended_join_type: left
    business_meaning: "Join customers to subscriptions to report MRR by customer name and segment."
    required_for: [subscription_revenue_360, subscription_mrr_by_customer_segment]
    validation:
      left_key_unique: true
      right_key_nullable_allowed: false
      max_unmatched_left_rate: 0.50
      max_unmatched_right_rate: 0.02
    warnings:
      - "Customer duplicates can duplicate MRR; deduplicate customers by customer_id before joining."

  - id: plans_to_subscriptions
    left_source: dim_plans
    right_source: fact_subscriptions
    left_key: plan_id
    right_key: plan_id
    relationship_type: one_to_many
    recommended_join_type: left
    business_meaning: "Join plans to subscriptions to attach plan names."
    required_for: [subscription_revenue_360]
    validation:
      left_key_unique: true
      right_key_nullable_allowed: false
      max_unmatched_left_rate: 0.80
      max_unmatched_right_rate: 0.02
    warnings:
      - "Pre-aggregate subscriptions by plan_id before joining if needed."

  - id: subscriptions_to_invoices
    left_source: fact_subscriptions
    right_source: stripe_invoices
    left_key: subscription_id
    right_key: subscription_id
    relationship_type: one_to_many
    recommended_join_type: left
    business_meaning: "Join subscriptions to invoices to combine MRR with billed revenue and discount adjustments."
    required_for: [subscription_revenue_360, subscription_collection_health]
    validation:
      left_key_unique: true
      right_key_nullable_allowed: false
      max_unmatched_left_rate: 0.40
      max_unmatched_right_rate: 0.02
    warnings:
      - "Aggregate invoice discounts to subscription-month before joining to MRR."

  - id: invoices_to_payments_by_invoice_id
    left_source: stripe_invoices
    right_source: stripe_payments
    left_key: invoice_id
    right_key: invoice_id
    relationship_type: one_to_many
    recommended_join_type: left
    business_meaning: "Join invoices to payments to attach successful collected amounts and refunds."
    required_for: [subscription_revenue_360, stripe_billing_reconciliation, subscription_collection_health]
    validation:
      left_key_unique: true
      right_key_nullable_allowed: false
      max_unmatched_left_rate: 0.50
      max_unmatched_right_rate: 0.30
    warnings:
      - "Pre-aggregate payments by invoice_id before joining to avoid duplicated invoice revenue."
