source:
  name: stripe_payments
  dbt_source: "source('stripe', 'payments')"
  description: "Minimal Stripe payment table for successful collected amounts and refund adjustments."
  owner: "Finance Analytics"
  aliases: [stripe payments, payments, payment data, collected revenue, successful payments, refunds, payment month]

business_context:
  data_product_goal: "Provide successful payment and refund adjustment context for revenue products."
  final_mart: "mart_payments__collections"
  metric_name: "collected_revenue"
  grain: [payment_id]
  primary_metric_dimensions: [payment_month]
  keywords: [payments, collected revenue, successful payments, refunds, payment month]
  notes:
    - "successful_amount is collected cash from successful payments."
    - "refund_amount should be handled by an explicit business rule when building net revenue or net MRR."
    - "Customer attributes are reached through invoice -> subscription -> customer joins."

artifact_plan:
  package_name: "Stripe Payment Data Product Draft"
  source_name: "stripe_payments"
  final_mart_name: "mart_payments__collections"
  model_files: [stg_stripe__payments.sql]
  test_files: [schema.yml]
  documentation_files: [pipeline_summary.md]

columns:
  payment_id:
    type: text
    primary_key: true
    nullable: false
    description: "Unique payment identifier."
  invoice_id:
    type: text
    nullable: false
    description: "Related invoice identifier."
  payment_month:
    type: text
    nullable: false
    description: "Payment month in YYYY-MM format."
  successful_amount:
    type: real
    nullable: false
    description: "Successful collected payment amount."
  refund_amount:
    type: real
    nullable: false
    description: "Refund amount associated with this payment, zero if not refunded."

business_rules:
  refund_handling:
    required_when_positive_column_present: refund_amount
    severity: must_answer
    affects: [metric_logic, sql_model, documentation]
