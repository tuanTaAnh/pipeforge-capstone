source:
  name: fact_subscriptions
  dbt_source: "source('demo', 'fact_subscriptions')"
  description: "Minimal subscription fact table and source of truth for gross MRR."
  owner: "Finance Analytics"
  aliases: [subscriptions, subscription fact, mrr, gross mrr, monthly recurring revenue, recurring revenue]

business_context:
  data_product_goal: "Build MRR analytics by customer and plan."
  final_mart: "mart_subscription__monthly_mrr"
  metric_name: "mrr"
  grain: [subscription_id]
  primary_metric_dimensions: [customer_id, plan_id]
  keywords: [subscriptions, mrr, recurring revenue]
  notes:
    - "Gross MRR comes directly from mrr_amount."
    - "All rows in this demo table are valid subscription rows for MRR reporting."
    - "Net MRR decisions can use discount and refund adjustments from Stripe sources."

artifact_plan:
  package_name: "Subscription MRR Data Product Draft"
  source_name: "fact_subscriptions"
  final_mart_name: "mart_subscription__monthly_mrr"
  model_files: [stg_demo__subscriptions.sql, mart_subscription__monthly_mrr.sql]
  test_files: [schema.yml]
  documentation_files: [pipeline_summary.md]

columns:
  subscription_id:
    type: text
    primary_key: true
    nullable: false
    description: "Unique subscription identifier."
  customer_id:
    type: text
    nullable: false
    description: "Customer identifier."
  plan_id:
    type: text
    nullable: false
    description: "Plan identifier."
  mrr_amount:
    type: real
    nullable: false
    description: "Gross monthly recurring revenue amount."
