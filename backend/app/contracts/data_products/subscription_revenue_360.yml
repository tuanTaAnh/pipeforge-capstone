version: 1

data_product:
  name: subscription_revenue_360
  package_name: Subscription Revenue 360 Data Product
  description: >
    Build a compact board-ready monthly revenue mart with gross MRR, discount and
    refund adjustments, net MRR, and customer segment breakdowns.

  aliases:
    - revenue 360
    - subscription revenue 360
    - trusted monthly revenue dataset
    - monthly revenue dataset
    - board dashboard revenue
    - mrr by customer segment
    - gross and net mrr
    - refunds and discounts

  sources:
    - dim_customers
    - dim_plans
    - fact_subscriptions
    - stripe_invoices
    - stripe_payments

  primary_source: fact_subscriptions

  relationships:
    - customers_to_subscriptions
    - plans_to_subscriptions
    - subscriptions_to_invoices
    - invoices_to_payments_by_invoice_id

  grain:
    - invoice_month
    - customer_segment

  metrics:
    - name: gross_mrr
      source: fact_subscriptions.mrr_amount
      aggregation: sum
      description: Gross subscription MRR before discounts and refunds.
    - name: discount_amount
      source: stripe_invoices.discount_amount
      aggregation: sum
      description: Invoice discount adjustment amount.
    - name: refund_amount
      source: stripe_payments.refund_amount
      aggregation: sum
      description: Payment refund adjustment amount.
    - name: net_mrr
      expression: gross_mrr - discount_amount - refund_amount
      description: Net MRR after selected adjustment handling.

  business_questions:
    - id: q_refunds_discounts_handling
      question: Should the board dataset report gross MRR only, net MRR only, or both gross and net MRR with adjustment columns?
      priority: must_answer
      issue_summary: Refunds and discounts change how finance interprets monthly MRR for the board dashboard.
      recommended_option_id: gross_and_net
      recommendation_reason: Showing gross MRR, net MRR, and adjustment columns gives finance transparency and auditability.
      options:
        - id: gross_only
          label: Report gross MRR only and show adjustments separately
          resolved_rule: Keep gross MRR unchanged and expose discounts/refunds as separate supporting columns.
          implementation: Keep gross_mrr from subscriptions and add discount_amount/refund_amount columns without netting them into the primary MRR metric.
        - id: net_only
          label: Report net MRR after discounts and refunds
          resolved_rule: Net MRR equals gross MRR minus discount and refund adjustments.
          implementation: Derive net_mrr = gross_mrr - discount_amount - refund_amount.
        - id: gross_and_net
          label: Report both gross MRR and net MRR with adjustment breakdown
          resolved_rule: Report gross_mrr, discount_amount, refund_amount, and net_mrr together.
          implementation: Build a mart with gross_mrr, discount_amount, refund_amount, and net_mrr at month/segment grain.

  artifact_plan:
    package_name: Subscription Revenue 360 Data Product
    source_name: subscription_revenue_360
    final_mart_name: mart_subscription__revenue_360_monthly
    model_files:
      - stg_demo__customers.sql
      - stg_demo__plans.sql
      - stg_demo__subscriptions.sql
      - stg_stripe__invoices.sql
      - stg_stripe__payments.sql
      - int_subscription__mrr_adjustments.sql
      - mart_subscription__revenue_360_monthly.sql
    test_files:
      - schema.yml
      - custom_tests/test_revenue_360_metrics_not_null.sql
    documentation_files:
      - pipeline_summary.md

  join_plan:
    steps:
      - id: stg_customers
        type: staging
        source: dim_customers
        output_model: stg_demo__customers
      - id: stg_plans
        type: staging
        source: dim_plans
        output_model: stg_demo__plans
      - id: stg_subscriptions
        type: staging
        source: fact_subscriptions
        output_model: stg_demo__subscriptions
      - id: stg_invoices
        type: staging
        source: stripe_invoices
        output_model: stg_stripe__invoices
      - id: stg_payments
        type: staging
        source: stripe_payments
        output_model: stg_stripe__payments
      - id: monthly_adjustments
        type: aggregate
        description: Aggregate discounts and refunds by subscription and invoice_month before joining to gross MRR.
      - id: final_mart
        type: aggregate
        output_model: mart_subscription__revenue_360_monthly
        group_by: [invoice_month, customer_segment]
