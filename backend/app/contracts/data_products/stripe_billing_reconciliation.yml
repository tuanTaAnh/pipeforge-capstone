version: 1

data_product:
  name: stripe_billing_reconciliation
  package_name: Stripe Billing Reconciliation Data Product
  description: Reconcile invoice amounts with successful collected payments by invoice.
  aliases: [billing reconciliation, invoice payment reconciliation, billed vs collected revenue, reconcile invoices and payments]
  sources: [stripe_invoices, stripe_payments]
  primary_source: stripe_invoices
  relationships: [invoices_to_payments_by_invoice_id]
  grain: [invoice_id]
  metrics:
    - name: billed_amount
      source: stripe_invoices.invoice_amount
      description: Invoice amount.
    - name: collected_amount
      source: stripe_payments.successful_amount
      aggregation: sum
      description: Successful collected amount.
    - name: refund_amount
      source: stripe_payments.refund_amount
      aggregation: sum
      description: Refund amount.
    - name: reconciliation_difference
      expression: billed_amount - collected_amount
      description: Difference between invoice amount and successful collected cash.
  business_questions: []
  artifact_plan:
    package_name: Stripe Billing Reconciliation Data Product
    source_name: stripe_billing_reconciliation
    final_mart_name: mart_billing__invoice_reconciliation
    model_files: [stg_stripe__invoices.sql, stg_stripe__payments.sql, mart_billing__invoice_reconciliation.sql]
    test_files: [schema.yml]
    documentation_files: [pipeline_summary.md]
