version: 1

data_product:
  name: subscription_collection_health
  package_name: Subscription Collection Health Data Product
  description: Track billed, collected, refunded, and outstanding amounts by invoice month and customer segment.
  aliases: [collection health, collection dashboard, accounts receivable health, collection rate]
  sources: [dim_customers, fact_subscriptions, stripe_invoices, stripe_payments]
  optional_sources: [dim_plans]
  primary_source: stripe_invoices
  relationships: [customers_to_subscriptions, subscriptions_to_invoices, invoices_to_payments_by_invoice_id]
  grain: [invoice_month, customer_segment]
  metrics:
    - name: billed_amount
      source: stripe_invoices.invoice_amount
      aggregation: sum
    - name: collected_amount
      source: stripe_payments.successful_amount
      aggregation: sum
    - name: refund_amount
      source: stripe_payments.refund_amount
      aggregation: sum
    - name: outstanding_amount
      expression: billed_amount - collected_amount
  business_questions: []
  artifact_plan:
    package_name: Subscription Collection Health Data Product
    source_name: subscription_collection_health
    final_mart_name: mart_billing__collection_health_monthly
    model_files: [stg_demo__customers.sql, stg_demo__subscriptions.sql, stg_stripe__invoices.sql, stg_stripe__payments.sql, mart_billing__collection_health_monthly.sql]
    test_files: [schema.yml]
    documentation_files: [pipeline_summary.md]
