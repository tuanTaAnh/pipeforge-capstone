version: 1

dimensions:
  customer:
    label: Customer
    business_terms: [customer, customers, client, account]
    source: dim_customers
    key: customer_id
    label_column: customer_name
    default_columns: [customer_id, customer_name]
    attributes: [customer_name, customer_segment]

  customer_name:
    label: Customer Name
    business_terms: [customer name, account name, client name]
    source: dim_customers
    key: customer_id
    column: customer_name
    default_columns: [customer_name]

  customer_segment:
    label: Customer Segment
    business_terms: [segment, customer segment, customer type]
    source: dim_customers
    key: customer_id
    column: customer_segment
    default_columns: [customer_segment]

  plan:
    label: Plan
    business_terms: [plan, plan name, subscription plan]
    source: dim_plans
    key: plan_id
    label_column: plan_name
    default_columns: [plan_id, plan_name]

  plan_name:
    label: Plan Name
    business_terms: [plan name, subscription plan name]
    source: dim_plans
    key: plan_id
    column: plan_name
    default_columns: [plan_name]

  invoice_month:
    label: Invoice Month
    business_terms: [invoice month, billing month, month]
    source: stripe_invoices
    key: invoice_id
    column: invoice_month
    default_columns: [invoice_month]

  payment_month:
    label: Payment Month
    business_terms: [payment month, collection month]
    source: stripe_payments
    key: payment_id
    column: payment_month
    default_columns: [payment_month]
