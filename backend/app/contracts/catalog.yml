version: 1

database:
  name: pipeforge_demo
  domain: subscription_finance_analytics
  description: >
    Minimal SaaS subscription finance demo database for agent transparency demos.
    It uses five small tables with intentionally simple business logic and no currency conversion complexity.

sources:
  - name: dim_customers
    contract_path: dim_customers.yml
    table_name: dim_customers
    business_entity: customer
    source_role: dimension
    grain: one row per customer
    primary_key: customer_id
    important_columns: [customer_id, customer_name, customer_segment]
    business_meaning: Customer identity and segment attributes for revenue reporting.
    keywords: [customer, customers, account, customer name, segment, customer segment]

  - name: dim_plans
    contract_path: dim_plans.yml
    table_name: dim_plans
    business_entity: plan
    source_role: dimension
    grain: one row per subscription plan
    primary_key: plan_id
    important_columns: [plan_id, plan_name]
    business_meaning: Plan names for subscription reporting.
    keywords: [plan, plans, subscription plan, plan name]

  - name: fact_subscriptions
    contract_path: fact_subscriptions.yml
    table_name: fact_subscriptions
    business_entity: subscription
    source_role: fact
    grain: one row per subscription
    primary_key: subscription_id
    important_columns: [subscription_id, customer_id, plan_id, mrr_amount]
    business_meaning: Subscription source of truth for gross MRR.
    keywords: [subscription, subscriptions, mrr, gross mrr, recurring revenue]

  - name: stripe_invoices
    contract_path: stripe_invoices.yml
    table_name: stripe_invoices
    business_entity: invoice
    source_role: fact
    grain: one row per invoice
    primary_key: invoice_id
    important_columns: [invoice_id, subscription_id, invoice_month, invoice_amount, discount_amount]
    business_meaning: Stripe invoice source for billed revenue, invoice month, and discount adjustments.
    keywords: [invoice, invoices, billing, billed revenue, discounts, discount amount, invoice month]

  - name: stripe_payments
    contract_path: stripe_payments.yml
    table_name: stripe_payments
    business_entity: payment
    source_role: fact
    grain: one row per successful payment
    primary_key: payment_id
    important_columns: [payment_id, invoice_id, payment_month, successful_amount, refund_amount]
    business_meaning: Stripe payment source for successful collected amounts and refund adjustments.
    keywords: [payment, payments, collected revenue, successful payments, refund, refund amount, payment month]
