source:
  name: dim_customers
  dbt_source: "source('demo', 'dim_customers')"
  description: "Minimal customer dimension for customer identity and segment reporting."
  owner: "Finance Analytics"
  aliases: [customers, customer dimension, customer name, customer segment, accounts]

business_context:
  data_product_goal: "Provide customer names and segments for revenue analytics."
  final_mart: "dim_customers_clean"
  metric_name: "customer_count"
  grain: [customer_id]
  primary_metric_dimensions: [customer_name, customer_segment]
  keywords: [customer, customer name, segment]
  notes:
    - "Join customer facts through customer_id."

artifact_plan:
  package_name: "Customer Dimension Data Product Draft"
  source_name: "dim_customers"
  final_mart_name: "dim_customers_clean"
  model_files: [stg_demo__customers.sql]
  test_files: [schema.yml]
  documentation_files: [pipeline_summary.md]

columns:
  customer_id:
    type: text
    primary_key: true
    nullable: false
    description: "Unique customer identifier."
  customer_name:
    type: text
    nullable: false
    description: "Customer display name."
  customer_segment:
    type: text
    nullable: false
    description: "Customer reporting segment."
    valid_values: [enterprise, mid_market, startup, self_serve]
