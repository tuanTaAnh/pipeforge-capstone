source:
  name: dim_plans
  dbt_source: "source('demo', 'dim_plans')"
  description: "Minimal subscription plan dimension."
  owner: "Finance Analytics"
  aliases: [plans, plan dimension, subscription plans, plan name]

business_context:
  data_product_goal: "Provide plan names for subscription analytics."
  final_mart: "dim_plans_clean"
  metric_name: "plan_count"
  grain: [plan_id]
  primary_metric_dimensions: [plan_name]
  keywords: [plans, plan name]
  notes:
    - "Join plans to subscriptions through plan_id."

artifact_plan:
  package_name: "Plan Dimension Data Product Draft"
  source_name: "dim_plans"
  final_mart_name: "dim_plans_clean"
  model_files: [stg_demo__plans.sql]
  test_files: [schema.yml]
  documentation_files: [pipeline_summary.md]

columns:
  plan_id:
    type: text
    primary_key: true
    nullable: false
    description: "Unique subscription plan identifier."
  plan_name:
    type: text
    nullable: false
    description: "Plan display name."
