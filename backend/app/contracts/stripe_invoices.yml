source:
  name: stripe_invoices
  dbt_source: "source('stripe', 'invoices')"
  description: "Minimal Stripe invoice table for billed revenue, invoice month, and discounts."
  owner: "Finance Analytics"
  aliases: [stripe invoices, invoices, invoice data, billed revenue, discounts, invoice month]

business_context:
  data_product_goal: "Provide invoice-level billed revenue and discount context."
  final_mart: "mart_billing__monthly_invoice_revenue"
  metric_name: "billed_revenue"
  grain: [invoice_id]
  primary_metric_dimensions: [invoice_month]
  keywords: [invoice, billing, billed revenue, discounts, invoice month]
  notes:
    - "discount_amount may be null; business rule should define whether null means zero discount."
    - "Customer attributes are reached through subscription -> customer joins."
    - "invoice_month is a month key stored as text in YYYY-MM format, not a full date or timestamp."

artifact_plan:
  package_name: "Stripe Invoice Data Product Draft"
  source_name: "stripe_invoices"
  final_mart_name: "mart_billing__monthly_invoice_revenue"
  model_files: [stg_stripe__invoices.sql]
  test_files: [schema.yml]
  documentation_files: [pipeline_summary.md]

columns:
  invoice_id:
    type: text
    primary_key: true
    nullable: false
    description: "Unique invoice identifier."

  subscription_id:
    type: text
    nullable: false
    description: "Related subscription identifier."

  invoice_month:
    type: text
    logical_type: month
    format: YYYY-MM
    sql_handling: preserve_as_text
    sample_values:
      - "2026-04"
      - "2026-05"
      - "2026-06"
    nullable: false
    description: "Invoice reporting month stored as a text month key in YYYY-MM format."
    modeling_notes:
      - "This is not a full date or timestamp."
      - "Use this value directly for month filtering, grouping, and joins."
      - "If normalization is needed, use substr(invoice_month, 1, 7)."
      - "Do not parse this value with date(), datetime(), or strftime() unless a future contract changes sql_handling."

  invoice_amount:
    type: real
    nullable: false
    description: "Gross invoice amount before discount handling."

  discount_amount:
    type: real
    nullable: true
    description: "Discount amount. Null should be interpreted by an explicit business rule."
    business_rules:
      require_decision_when_null_rate_ge: 0.10
      decision_reason: "Missing discounts affect net MRR or net revenue calculations."