services:
  backend:
    build:
      context: ./backend
    container_name: pipeforge-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/workspace:/app/workspace
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: pipeforge-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend